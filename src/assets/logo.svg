<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#181825"/>
      <stop offset="100%" stop-color="#0e0e12"/>
    </linearGradient>
    
    <!-- Gold / Orange - Crimson Gradient -->
    <linearGradient id="primaryGrad" x1="25" y1="25" x2="75" y2="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="6" y="6" width="88" height="88" rx="22" fill="url(#bg)" stroke="#be123c" stroke-width="1.5" stroke-opacity="0.3"/>
  
  <!-- Subtle inner border glow -->
  <rect x="7.5" y="7.5" width="85" height="85" rx="20.5" stroke="white" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Shield/Document backdrop outline -->
  <path d="M30 35 C30 28, 70 28, 70 35 V65 C70 72, 30 72, 30 65 Z" fill="#27273a" fill-opacity="0.4" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="2 2" />

  <!-- Stylized letter 'C' in glowing orange-rose gradient -->
  <path d="M62 34 C58 30, 48 30, 42 36 C36 42, 36 58, 42 64 C48 70, 58 70, 62 66" stroke="url(#accentGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Stylized letter 'G' inside in glowing crimson gradient -->
  <path d="M54 44 H64 V56 C64 60, 58 64, 52 64 C46 64, 42 60, 42 54" stroke="url(#primaryGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Enterprise Grid lines representing tax columns/bill details -->
  <line x1="38" y1="44" x2="48" y2="44" stroke="white" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="46" y2="50" stroke="white" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="56" x2="48" y2="56" stroke="white" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>
</svg>
